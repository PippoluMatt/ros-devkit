# Gazebo Sim Plugin Registry
#
# Each entry maps a user-friendly alias to the plugin's details:
#
#   filename    : shared library name (used in the filename="..." attribute)
#   name        : C++ fully-qualified class name (used in the name="..." attribute)
#   category    : "model"  → added to <gazebo> in the robot xacro
#                 "sensor" → added as a <plugin> line to the world .sdf
#                 "world"  → added as a <plugin> line to the world .sdf (non-sensor)
#   needs_sensors_system: true if the Sensors system plugin (with render engine)
#                         must also be present in the world .sdf
#   description : short human-readable summary shown by --list-plugins
#   github_dir   : directory name under src/systems/ in the gz-sim repository
#   github_file  : .cc filename (last line contains GZ_ADD_PLUGIN_ALIAS)
#
# The filename convention is: gz-sim-<cmake_name>-system
# The name convention is:    gz::sim::systems::<ClassName>
#
# To add a new plugin that is not listed here, the tool can fetch the last line
# of the .cc file from GitHub to extract the name, and derive the filename
# from the CMakeLists.txt gz_add_system() call.

